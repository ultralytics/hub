name: HUB CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # runs every 24 hours, starting at 02:00 UTC

env:
  API_KEY: ${{ secrets.ULTRALYTICS_HUB_API_KEY }}
  MODEL_ID: ${{ secrets.ULTRALYTICS_HUB_MODEL_ID }}

jobs:
  Tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ultralytics/actions/setup-uv@main
      - name: Install requirements
        run: |
          uv pip install --system ultralytics hub-sdk --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Check environment
        run: |
          yolo checks
          uv pip list
      - name: Check HUB credentials
        id: hub_secrets
        shell: bash
        run: |
          if [[ -n "${API_KEY}" && -n "${MODEL_ID}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping HUB API integration tests because HUB secrets are unavailable."
            if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
              echo "::error::ULTRALYTICS_HUB_API_KEY and ULTRALYTICS_HUB_MODEL_ID are required for ${GITHUB_EVENT_NAME} runs."
              exit 1
            fi
          fi
      - name: Login to HUB
        if: steps.hub_secrets.outputs.available == 'true'
        run: |
          yolo login "$API_KEY"
      - name: Test HUB training
        if: steps.hub_secrets.outputs.available == 'true'
        continue-on-error: false
        shell: python
        run: |
          import os
          from ultralytics import YOLO, hub
          model_id = os.environ['MODEL_ID']
          hub.reset_model(model_id)
          model = YOLO('https://hub.ultralytics.com/models/' + model_id)
          model.train()
      - name: Test HUB inference API
        if: steps.hub_secrets.outputs.available == 'true'
        shell: python
        run: |
          import os
          import requests
          import json
          from io import BytesIO
          api_key, model_id = os.environ['API_KEY'], os.environ['MODEL_ID']
          url = f"https://api.ultralytics.com/v1/predict/{model_id}"
          headers = {"x-api-key": api_key}
          data = {"size": 320, "confidence": 0.25, "iou": 0.45}
          f = BytesIO(requests.get("https://github.com/ultralytics/assets/releases/download/v0.0.0/zidane.jpg").content)
          response = requests.post(url, headers=headers, data=data, files={"image": f})
          response.raise_for_status()  # ensure we got a successful response
          print(json.dumps(response.json(), indent=2))
      - name: Test HUB export
        if: steps.hub_secrets.outputs.available == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          python .github/scripts/run_hub_exports.py
      - name: Notify on failure
        if: (cancelled() || failure()) && github.repository == 'ultralytics/hub' && (github.event_name == 'schedule' || github.event_name == 'push') && github.run_attempt == '1'
        uses: slackapi/slack-github-action@v4.0.0
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_HUBWEB }}
          payload: |
            text: "<!subteam^S07NKMNECKH> *${{ github.workflow }}* ❌ `${{ github.repository }}`  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|*Run*>"
