# Ultralytics Actions https://github.com/ultralytics/actions
# This workflow formats code and documentation in PRs to Ultralytics standards

name: Ultralytics Actions

on:
  issues:
    types: [opened]
  pull_request:
    branches: [main]
    types: [opened, closed, synchronize, review_requested]

permissions:
  contents: write # Modify code in PRs
  pull-requests: write # Add comments and labels to PRs
  issues: write # Add comments and labels to issues

jobs:
  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Run Ultralytics Actions
        uses: ultralytics/actions@main
        with:
          token: ${{ secrets._GITHUB_TOKEN || secrets.GITHUB_TOKEN }} # Auto-generated token
          labels: true # Auto-label issues/PRs using AI
          python: true # Format Python with Ruff and docformatter
          prettier: true # Format YAML, JSON, Markdown, CSS
          spelling: true # Check spelling with codespell
          links: false # Check broken links with Lychee
          summary: true # Generate AI-powered PR summaries
          openai_api_key: ${{ secrets.OPENAI_API_KEY }} # Powers PR summaries, labels and comments
          brave_api_key: ${{ secrets.BRAVE_API_KEY }} # Used for broken link resolution
          first_issue_response: |
            👋 Hello @${{ github.actor }}, thank you for raising an issue in the legacy [Ultralytics HUB](https://hub.ultralytics.com) repository.

            Ultralytics HUB is being deprecated and will be wound down at the end of July 2026. New projects should use [Ultralytics Platform](https://platform.ultralytics.com/), the end-to-end computer vision platform for uploading data, annotating, training YOLO models, exporting production formats, deploying endpoints, and monitoring results.

            Existing HUB users can migrate all HUB datasets and models after creating a Platform account by pasting their HUB API key into **Settings > Integrations > Ultralytics HUB**.

            Please visit the [Ultralytics Platform Docs](https://docs.ultralytics.com/platform) to learn more:
            - [**Quickstart**](https://docs.ultralytics.com/platform). Create a project, upload data, train a model, and deploy with Platform.
            - [**Datasets**](https://docs.ultralytics.com/platform). Upload images, videos, ZIP, TAR, and NDJSON datasets, then analyze and annotate them.
            - [**Projects and Models**](https://docs.ultralytics.com/platform). Organize experiments, train on cloud GPUs, stream remote-training metrics, and manage `.pt` models.
            - [**Export and Deployment**](https://docs.ultralytics.com/platform). Export trained models to production formats and deploy monitored endpoints in global regions.
            - [**API Keys and Integrations**](https://docs.ultralytics.com/platform). Manage Platform access and migrate existing HUB assets.
            If this is a 🐛 Bug Report, please provide screenshots and steps to [reproduce](https://docs.ultralytics.com/help/minimum_reproducible_example/) your problem to help us get started working on a fix.
            If this is a ❓ Question, please provide as much information as possible, including dataset, model, environment details etc. so that we might provide the most helpful response.
            We try to respond to all issues as promptly as possible. Thank you for your patience!
